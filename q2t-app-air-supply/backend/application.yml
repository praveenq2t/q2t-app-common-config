spring:
  application:
    name: q2t-app-air-supply
  
  # Virtual Threads Configuration (Java 21+)
  # Enables virtual threads for request handling - provides massive concurrency improvements
  threads:
    virtual:
      enabled: true
  
  # Jackson Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC
    default-property-inclusion: non_null

  # Redis Cache Configuration
  cache:
    type: redis
    redis:
      time-to-live: 900000 # 15 minutes in ms
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 60000
      # Increased pool sizes for virtual threads support
      jedis:
        pool:
          max-active: 100  # Increased from 8 to handle more concurrent virtual threads
          max-idle: 50     # Increased from 8
          min-idle: 10     # Increased from 0 to maintain ready connections
          max-wait: 2000   # Max wait time for connection from pool (ms)

# AWS Secrets Manager Configuration
# Secrets are loaded ONCE at startup and cached until restart
# Path: {prefix}/{environment}/{project} => q2t/dev/air-supply
# Server: uses IAM role | Local: uses ~/.aws/credentials
aws:
  secrets:
    enabled: true
    region: ${AWS_REGION:ap-south-1}
    environment: ${spring.profiles.active:${ENVIRONMENT:dev}}
    project-name: air-supply
    prefix: q2t

server:
  port: ${SERVER_PORT:7800}
  servlet:
    context-path:
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

# Logging Configuration
logging:
  level:
    root: INFO
    com.q2t.bifrost: DEBUG
    com.q2t.bifrost.adapter.outbound.connector.amadeus.parser.AmadeusSearchResponseParser: TRACE
    org.springframework.ws: DEBUG
  file:
    # Default `logs` for local IDE runs; prod/uat override. Override anytime with LOGGING_FILE_PATH.
    path: ${LOGGING_FILE_PATH:logs}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [requestId=%X{requestId}] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [requestId=%X{requestId}] %-5level %logger{36} - %msg%n"

# Management & Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  info:
    title: Q2T Bifrost - Airline Connector API
    description: Unified API for airline GDS integrations
    version: 0.0.1
    contact:
      name: Q2T Team
      email: support@q2t.com

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    instances:
      amadeus:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 60000 # 60 seconds
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 30000 # 30 seconds
      
  retry:
    instances:
      amadeus:
        maxAttempts: 3
        waitDuration: 1000
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - org.springframework.web.client.ResourceAccessException
          - java.net.SocketTimeoutException
        ignoreExceptions:
          - com.q2t.bifrost.domain.exception.ValidationException
  
  ratelimiter:
    instances:
      amadeus:
        limitForPeriod: 100
        limitRefreshPeriod: 60s
        timeoutDuration: 5s
  
  timelimiter:
    instances:
      amadeus:
        timeoutDuration: 60s

# Connector Configuration
connectors:
  amadeus:
    enabled: true
    # Credentials loaded from AWS Secrets Manager
    # Keys: amadeusEndpoint, amadeusUsername, amadeusPassword, amadeusOfficeId
    connection-timeout: 10000
    read-timeout: 30000
    retry:
      max-attempts: 3
      backoff-ms: 2000
    circuit-breaker:
      failure-threshold: 50
      wait-duration-ms: 60000
      sliding-window-size: 10

# Other GDS Connectors (Placeholder - use environment variables)
sabre:
  enabled: ${SABRE_ENABLED:false}
  endpoint-url: ${SABRE_ENDPOINT_URL:}
  username: ${SABRE_USERNAME:}
  password: ${SABRE_PASSWORD:}
  pcc: ${SABRE_PCC:}

travelport:
  enabled: ${TRAVELPORT_ENABLED:false}
  endpoint-url: ${TRAVELPORT_ENDPOINT_URL:}
  username: ${TRAVELPORT_USERNAME:}
  password: ${TRAVELPORT_PASSWORD:}
  target-branch: ${TRAVELPORT_TARGET_BRANCH:}

# Application-specific Configuration
q2t:
  airsupply:
    # Cache Configuration
    cache:
      default-ttl: 900 # 15 minutes in seconds
      search-ttl: 900 # 15 minutes
      fare-ttl: 300 # 5 minutes
    
    # Search Configuration
    search:
      max-results: 50
      default-timeout: 30000
    
    # Audit Configuration
    audit:
      enabled: true
      log-requests: true
      log-responses: false # Can be verbose, enable for debugging

# Bifrost Configuration
bifrost:
  security:
    enabled: ${BIFROST_SECURITY_ENABLED:true}
    # api-key loaded from AWS Secrets Manager (key: bifrostApiKey)
    header-name: X-API-Key
  cache:
    default-ttl: 900
    search-ttl: 900
    fare-ttl: 300
  search:
    max-results: 50
    default-timeout: 30000
  audit:
    enabled: true
    log-requests: true
    log-responses: false


